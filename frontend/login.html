<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAILSAFE — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-box card">
    <div class="logo mono">FAILSAFE</div>
    <div class="tagline">Student Failure Risk Prediction System</div>

    <!-- Tabs -->
    <div class="login-tabs">
      <button class="active" onclick="switchTab('login')">Sign In</button>
      <button onclick="switchTab('register')">Register</button>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <!-- Login form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group mb-16">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@college.edu" required />
      </div>
      <div class="form-group mb-16">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
    </form>

    <!-- Register form -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group mb-16">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Dr. Ananya Sharma" required />
      </div>
      <div class="form-group mb-16">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@college.edu" required />
      </div>
      <div class="form-group mb-16">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <div class="form-group mb-16">
        <label>Role</label>
        <select id="reg-role">
          <option value="faculty">Faculty</option>
          <option value="hod">HOD</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
    </form>
  </div>
</div>

<script>
  const API = "http://localhost:8000";

  // Redirect if already logged in
  if (localStorage.getItem("token")) window.location.href = "dashboard.html";

  function switchTab(tab) {
    document.querySelectorAll(".login-tabs button").forEach((b, i) => {
      b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
    });
    document.getElementById("login-form").classList.toggle("hidden", tab !== "login");
    document.getElementById("register-form").classList.toggle("hidden", tab !== "register");
    document.getElementById("error-msg").style.display = "none";
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    const body = new URLSearchParams({ username: email, password });
    const res  = await fetch(`${API}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body,
    });

    if (!res.ok) {
      const err = await res.json();
      showError(err.detail || "Login failed");
      return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.access_token);
    localStorage.setItem("user_name", data.name);
    localStorage.setItem("user_role", data.role);
    window.location.href = "dashboard.html";
  }

  async function handleRegister(e) {
    e.preventDefault();
    const body = {
      name:     document.getElementById("reg-name").value,
      email:    document.getElementById("reg-email").value,
      password: document.getElementById("reg-password").value,
      role:     document.getElementById("reg-role").value,
    };

    const res = await fetch(`${API}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      showError(err.detail || "Registration failed");
      return;
    }

    showError("");
    switchTab("login");
    document.getElementById("login-email").value = body.email;
    alert("Account created! Please sign in.");
  }
</script>
</body>
</html>
